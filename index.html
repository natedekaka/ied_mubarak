<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak 1447 H - natedekaka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-primary: #064e3b;
            --theme-accent: #facc15;
            --theme-bg: #021511;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--theme-bg); transition: background-color 0.5s ease; }
        .font-arabic { font-family: 'Reem Kufi', sans-serif; }
        .font-script { font-family: 'Dancing Script', cursive; }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1.5deg); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .theme-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .theme-btn:hover { transform: scale(1.3); border-color: white; }
        
        .mute-hint {
            animation: bounceLeft 2s infinite;
        }
        @keyframes bounceLeft {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-10px); }
        }
    </style>
</head>
<body class="text-white overflow-hidden select-none" onclick="enableAudio()">

    <!-- Background Layer -->
    <div class="fixed inset-0 z-0">
        <div id="dynamic-gradient" class="absolute inset-0 opacity-40" style="background: radial-gradient(circle at 50% 50%, var(--theme-primary), transparent 80%);"></div>
        <div id="bg-img" class="absolute inset-0 bg-cover bg-center transition-all duration-1000 opacity-20 scale-110"></div>
    </div>

    <canvas id="fireworks-canvas"></canvas>

    <!-- Theme Switcher -->
    <div class="fixed top-6 right-6 z-50 flex flex-col gap-4 glass p-4 rounded-3xl shadow-2xl">
        <div class="theme-btn bg-emerald-600" onclick="setTheme('#064e3b', '#facc15', '#021511')"></div>
        <div class="theme-btn bg-purple-700" onclick="setTheme('#4c1d95', '#fbbf24', '#0f0720')"></div>
        <div class="theme-btn bg-blue-800" onclick="setTheme('#1e3a8a', '#60a5fa', '#050b1a')"></div>
        <div class="theme-btn bg-rose-800" onclick="setTheme('#9f1239', '#fda4af', '#1a0505')"></div>
    </div>

    <!-- Mute Hint -->
    <div id="audio-hint" class="fixed bottom-10 left-10 z-50 flex items-center gap-3 glass px-5 py-3 rounded-full mute-hint border border-yellow-500/30">
        <span class="text-xl">🔊</span>
        <span class="text-sm font-bold text-yellow-500 uppercase tracking-tighter">Sentuh layar untuk suara</span>
    </div>

    <!-- Main UI -->
    <main class="relative z-20 h-screen w-screen flex flex-col items-center justify-center p-6">
        
        <div class="glass max-w-lg w-full rounded-[3.5rem] p-12 md:p-16 text-center animate-float shadow-[0_0_50px_rgba(0,0,0,0.5)] border-t border-white/20">
            <!-- Decorative Accent -->
            <div id="accent-glow" class="absolute -top-20 -left-20 w-60 h-60 opacity-10 blur-[100px]" style="background-color: var(--theme-accent);"></div>
            
            <div class="font-arabic text-2xl md:text-3xl mb-6 tracking-[0.3em] transition-colors duration-500" style="color: var(--theme-accent);">عيد مبارك</div>
            
            <h1 class="font-script text-6xl md:text-7xl mb-10 transition-colors duration-500 drop-shadow-2xl" style="color: var(--theme-accent);">Idul Fitri 1447 H</h1>
            
            <div class="h-48 flex items-center justify-center mb-10">
                <p id="genz-text" class="text-xl md:text-2xl font-light leading-relaxed italic text-white/90 transition-all duration-700">
                    Mencari sinyal berkah...
                </p>
            </div>

            <div class="pt-10 border-t border-white/5 relative">
                <p class="text-[11px] tracking-[0.5em] uppercase opacity-40 font-black mb-3">Vibes Curator</p>
                <p class="text-2xl font-black tracking-widest uppercase bg-clip-text text-transparent bg-gradient-to-r from-white via-yellow-500 to-white">natedekaka</p>
            </div>
        </div>

        <div class="mt-10 flex items-center gap-4 opacity-30">
            <div class="h-[1px] w-12 bg-white/20"></div>
            <span class="text-[10px] uppercase tracking-[0.6em] whitespace-nowrap">Auto Fireworks & Viral Hits</span>
            <div class="h-[1px] w-12 bg-white/20"></div>
        </div>
    </main>

    <!-- Audio Stack -->
    <audio id="bgm" preload="auto"></audio>
    <audio id="sfx-pop" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- Viral Songs List ---
        const playlist = [
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // Ganti dengan URL lagu lebaran viral
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
        ];

        // --- Theme Logic ---
        function setTheme(primary, accent, bg) {
            document.documentElement.style.setProperty('--theme-primary', primary);
            document.documentElement.style.setProperty('--theme-accent', accent);
            document.documentElement.style.setProperty('--theme-bg', bg);
            document.getElementById('dynamic-gradient').style.background = `radial-gradient(circle at 50% 50%, ${primary}, transparent 80%)`;
            document.body.style.backgroundColor = bg;
        }

        // --- Gen Z Content ---
        const messages = [
            "POV: Lu dapet maaf dari doi pas Lebaran. No cap, ini vibes paling adem. Minal Aidin Wal Faizin, Bestie! ✨",
            "Slay hari raya dengan hati yang bersih. Skip drama, fokus berkah. Maafin segala khilaf gue ya, lowkey sering khilaf! 🙏",
            "Minal Aidin Wal Faizin! Semoga rejeki lu tumpah-tumpah kayak kuah opor. Stay halal, stay slay! 🌙",
            "Lebaran vibes check: Hati suci, baju baru (optional), maaf-maafan (mandatory). Happy Eid Mubarak, fam! 🔥",
            "Otw fitrah lagi nih. Maaf lahir batin ya, kalo ada salah kata yang gak banget. Let's start a new chapter! 🍃",
            "Gak kerasa udah lebaran aja. Hati kudu glowing lahir batin. Maafin kesalahan gue yang kemaren-kemaren ya! 🤲"
        ];

        let mIdx = 0;
        const textEl = document.getElementById('genz-text');
        const bgm = document.getElementById('bgm');
        const sfxPop = document.getElementById('sfx-pop');
        const audioHint = document.getElementById('audio-hint');

        function rotateContent() {
            textEl.style.opacity = '0';
            textEl.style.transform = 'translateY(15px)';
            setTimeout(() => {
                textEl.innerText = messages[mIdx];
                textEl.style.opacity = '1';
                textEl.style.transform = 'translateY(0)';
                mIdx = (mIdx + 1) % messages.length;
            }, 700);
        }

        // --- Audio Logic ---
        function playRandomSong() {
            const song = playlist[Math.floor(Math.random() * playlist.length)];
            bgm.src = song;
            bgm.volume = 0.4;
            bgm.play().catch(() => {
                console.log("Waiting for user interaction for audio...");
            });
            bgm.onended = playRandomSong; // Auto next song
        }

        let audioStarted = false;
        function enableAudio() {
            if (!audioStarted) {
                playRandomSong();
                audioHint.style.display = 'none';
                audioStarted = true;
            }
        }

        // --- Fireworks System ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.radius = Math.random() * 2.5 + 0.5;
                this.velocity = { x: (Math.random() - 0.5) * 12, y: (Math.random() - 0.5) * 12 };
                this.life = 100;
                this.opacity = 1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
            }
            update() {
                this.velocity.y += 0.1; // gravity
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.life -= 1.8;
                this.opacity = Math.max(0, this.life / 100);
            }
        }

        function explode() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.6);
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--theme-accent').trim();
            const colors = [accent, '#FFFFFF', '#FFD700', '#FF4D4D', '#00FFFF'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            // SFX
            if (audioStarted) {
                const clonePop = sfxPop.cloneNode();
                clonePop.volume = 0.1;
                clonePop.play().catch(() => {});
            }

            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--theme-bg').trim();
            ctx.globalAlpha = 0.25;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;

            particles.forEach((p, i) => {
                if (p.life > 0) { p.update(); p.draw(); }
                else { particles.splice(i, 1); }
            });
            requestAnimationFrame(animate);
        }

        // Initialize
        window.onload = () => {
            setInterval(rotateContent, 7500);
            rotateContent();
            setInterval(explode, 1200);
            animate();
            // Try autoplay
            playRandomSong();
        };

    </script>
</body>
</html>
