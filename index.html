<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak 1447 H - natedekaka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-primary: #064e3b;
            --theme-accent: #facc15;
            --theme-bg: #021511;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--theme-bg); transition: background-color 0.5s ease; }
        .font-arabic { font-family: 'Reem Kufi', sans-serif; }
        .font-script { font-family: 'Dancing Script', cursive; }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .theme-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            transition: transform 0.3s ease;
        }
        .theme-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body class="text-white overflow-hidden">

    <!-- Background Layer -->
    <div class="fixed inset-0 z-0">
        <div id="dynamic-gradient" class="absolute inset-0 opacity-50" style="background: radial-gradient(circle at 50% 50%, var(--theme-primary), transparent 70%);"></div>
        <div id="bg-img" class="absolute inset-0 bg-cover bg-center transition-all duration-1000 opacity-20 scale-110"></div>
    </div>

    <canvas id="fireworks-canvas"></canvas>

    <!-- Color Picker Floating -->
    <div class="fixed top-6 right-6 z-50 flex flex-col gap-3 glass p-3 rounded-2xl shadow-xl">
        <div class="theme-btn bg-emerald-700" onclick="setTheme('#064e3b', '#facc15', '#021511')" title="Emerald"></div>
        <div class="theme-btn bg-purple-800" onclick="setTheme('#4c1d95', '#fbbf24', '#0f0720')" title="Royal"></div>
        <div class="theme-btn bg-blue-900" onclick="setTheme('#1e3a8a', '#60a5fa', '#050b1a')" title="Midnight"></div>
        <div class="theme-btn bg-red-900" onclick="setTheme('#7f1d1d', '#f87171', '#1a0505')" title="Crimson"></div>
    </div>

    <!-- UI Main Content -->
    <main class="relative z-20 h-screen w-screen flex flex-col items-center justify-center p-6">
        
        <div class="glass max-w-md w-full rounded-[3rem] p-10 md:p-14 text-center animate-float shadow-2xl relative overflow-hidden">
            <!-- Decorative Glow -->
            <div id="accent-glow" class="absolute -top-10 -left-10 w-40 h-40 opacity-20 blur-3xl" style="background-color: var(--theme-accent);"></div>
            
            <div class="font-arabic text-2xl mb-4 tracking-widest opacity-80 transition-colors" style="color: var(--theme-accent);">عيد مبارك</div>
            
            <h1 class="font-script text-5xl md:text-6xl mb-8 transition-colors drop-shadow-lg" style="color: var(--theme-accent);">Idul Fitri 1447 H</h1>
            
            <div class="h-44 flex items-center justify-center mb-8">
                <p id="genz-text" class="text-lg md:text-xl font-light leading-relaxed italic text-white transition-all duration-700">
                    Slay hari kemenangan...
                </p>
            </div>

            <div class="pt-8 border-t border-white/10">
                <p class="text-[10px] tracking-[0.4em] uppercase opacity-50 font-bold mb-2">Vibes by</p>
                <p class="text-xl font-extrabold tracking-widest uppercase">natedekaka</p>
            </div>
        </div>

        <div class="mt-8 flex items-center gap-2 opacity-40 hover:opacity-100 transition-opacity cursor-help">
            <span class="text-xs uppercase tracking-widest">Auto Play Active</span>
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>
    </main>

    <!-- Audio Elements -->
    <audio id="bgm" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfx-pop" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- Theme Logic ---
        function setTheme(primary, accent, bg) {
            document.documentElement.style.setProperty('--theme-primary', primary);
            document.documentElement.style.setProperty('--theme-accent', accent);
            document.documentElement.style.setProperty('--theme-bg', bg);
            
            document.getElementById('dynamic-gradient').style.background = `radial-gradient(circle at 50% 50%, ${primary}, transparent 70%)`;
            document.body.style.backgroundColor = bg;
        }

        // --- Gen Z Content ---
        const messages = [
            "POV: Lu dapet maaf dari doi pas Lebaran. No cap, ini vibes paling adem. Minal Aidin Wal Faizin, Bestie! ✨",
            "Slay hari raya dengan hati yang bersih. Skip drama, fokus berkah. Maafin segala khilaf gue ya, lowkey sering khilaf! 🙏",
            "Minal Aidin Wal Faizin! Semoga rejeki lu tumpah-tumpah kayak kuah opor. Stay halal, stay slay! 🌙",
            "Lebaran vibes check: Hati suci, baju baru (optional), maaf-maafan (mandatory). Happy Eid Mubarak, fam! 🔥",
            "Otw fitrah lagi nih. Maaf lahir batin ya, kalo ada salah kata yang gak banget. Let's start a new chapter! 🍃",
            "Gak kerasa udah lebaran aja. Hati kudu glowing lahir batin. Maafin kesalahan gue yang kemaren-kemaren ya! 🤲"
        ];

        const images = [
            "https://images.unsplash.com/photo-1598048145816-43516339480d?auto=format&fit=crop&q=80&w=1200",
            "https://images.unsplash.com/photo-1542332213-31f87348057f?auto=format&fit=crop&q=80&w=1200",
            "https://images.unsplash.com/photo-1564769641470-87a3939615a1?auto=format&fit=crop&q=80&w=1200"
        ];

        let mIdx = 0, iIdx = 0;
        const textEl = document.getElementById('genz-text');
        const bgEl = document.getElementById('bg-img');
        const bgm = document.getElementById('bgm');
        const sfxPop = document.getElementById('sfx-pop');

        function rotateContent() {
            textEl.style.opacity = '0';
            textEl.style.transform = 'translateY(10px)';
            setTimeout(() => {
                textEl.innerText = messages[mIdx];
                bgEl.style.backgroundImage = `url('${images[iIdx]}')`;
                textEl.style.opacity = '1';
                textEl.style.transform = 'translateY(0)';
                mIdx = (mIdx + 1) % messages.length;
                iIdx = (iIdx + 1) % images.length;
            }, 700);
        }

        // --- Aggressive Autoplay Logic ---
        function attemptPlay() {
            bgm.volume = 0.3;
            bgm.play().then(() => {
                console.log("Autoplay success!");
            }).catch(() => {
                console.log("Autoplay waiting for interaction...");
                // Jika gagal, mainkan di interaksi pertama (click/scroll/touch)
                document.addEventListener('click', () => bgm.play(), { once: true });
                document.addEventListener('touchstart', () => bgm.play(), { once: true });
            });
        }

        // --- Fireworks System ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2 + 0.5;
                this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
                this.life = 100;
                this.opacity = 1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
            }
            update() {
                this.velocity.y += 0.05;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.life -= 1.5;
                this.opacity = Math.max(0, this.life / 100);
            }
        }

        function explode() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.7);
            const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--theme-accent').trim();
            const colors = [accentColor, '#ffffff', '#fbbf24', '#f472b6', '#60a5fa'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            // SFX Play
            const clonePop = sfxPop.cloneNode();
            clonePop.volume = 0.15;
            clonePop.play().catch(() => {});

            for (let i = 0; i < 35; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--theme-bg').trim();
            ctx.globalAlpha = 0.2;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;

            particles.forEach((p, i) => {
                if (p.life > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(i, 1);
                }
            });
            requestAnimationFrame(animate);
        }

        // --- Start Everything on Load ---
        window.addEventListener('DOMContentLoaded', () => {
            attemptPlay();
            setInterval(rotateContent, 7000);
            rotateContent();
            setInterval(explode, 1400);
            animate();
        });

    </script>
</body>
</html>
