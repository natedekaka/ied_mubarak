<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Idul Fitri - natedekaka</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #051d16;
            --secondary: #d4af37;
            --accent: #ffd700;
            --text-light: #ffffff;
            --bg-overlay: rgba(0, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: var(--primary);
        }

        /* Layering System */
        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: opacity 1.5s ease;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, var(--primary) 100%);
            background-color: var(--bg-overlay);
            z-index: 2;
        }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3; /* Pastikan di atas overlay & background */
            pointer-events: none;
        }

        .main-content {
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10; /* Di atas segalanya */
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 25px;
            padding: 40px 25px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: fadeInScale 1.2s ease-out;
        }

        .calligraphy {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 1.4rem;
            color: var(--secondary);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 20px;
            line-height: 1.2;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .message-container {
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message {
            font-size: 1.05rem;
            line-height: 1.7;
            font-style: italic;
            color: #e0e0e0;
            transition: opacity 0.6s ease;
        }

        .signature {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        /* Animations */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Responsive Mobile Fixes */
        @media (max-width: 400px) {
            h1 { font-size: 2.3rem; }
            .card { padding: 30px 20px; }
            .message { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <div class="overlay"></div>
    <canvas id="fireworks-canvas"></canvas>

    <div class="main-content">
        <div class="card">
            <div class="calligraphy">عيد مبارك</div>
            <h1>Idul Fitri 1447 H</h1>
            <div class="message-container">
                <div class="message" id="text-display">Menyambut hari yang fitri...</div>
            </div>
            <div class="signature">natedekaka</div>
        </div>
    </div>

    <script>
        // --- Content Data ---
        const messages = [
            "Sebening embun pagi, seputih kapas yang suci. Mari kita rajut kembali ukhuwah dengan maaf yang tulus.",
            "Hati yang jernih adalah sebaik-baiknya tempat berteduh. Maafkan jika lisan pernah melukai, maafkan jika langkah pernah salah.",
            "Di hari yang suci ini, biarkan kasih sayang mengalir deras seperti air, menyejukkan jiwa dan mendamaikan semesta.",
            "Bukan baju baru yang utama, tapi hati yang diperbarui dengan ampunan-Nya. Selamat Idul Fitri 1447 H.",
            "Gema takbir memanggil kita kembali ke fitrah. Selamat Lebaran, mohon maaf lahir dan batin untukmu sekeluarga."
        ];

        const images = [
            "https://images.unsplash.com/photo-1598048145816-43516339480d?auto=format&fit=crop&q=80&w=1200",
            "https://images.unsplash.com/photo-1518005020250-675f0f0fd13b?auto=format&fit=crop&q=80&w=1200",
            "https://images.unsplash.com/photo-1542332213-31f87348057f?auto=format&fit=crop&q=80&w=1200"
        ];

        let mIdx = 0, iIdx = 0;

        function rotateContent() {
            const txt = document.getElementById('text-display');
            const bg = document.getElementById('bg-image');
            
            txt.style.opacity = 0;
            setTimeout(() => {
                txt.innerText = messages[mIdx];
                bg.style.backgroundImage = `url('${images[iIdx]}')`;
                txt.style.opacity = 1;
                mIdx = (mIdx + 1) % messages.length;
                iIdx = (iIdx + 1) % images.length;
            }, 600);
        }

        // --- Automatic Fireworks Logic ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2 + 1;
                this.velocity = {
                    x: (Math.random() - 0.5) * 10,
                    y: (Math.random() - 0.5) * 10
                };
                this.life = 100;
                this.opacity = 1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
            }

            update() {
                this.velocity.y += 0.05; // gravity
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.life -= 1.5;
                this.opacity = this.life / 100;
            }
        }

        function createExplosion() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.6);
            const colors = ['#FFD700', '#FFFFFF', '#FF4500', '#ADFF2F', '#00FFFF'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            // Efek trail yang halus
            ctx.fillStyle = 'rgba(5, 29, 22, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, i) => {
                if (p.life > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(i, 1);
                }
            });
            requestAnimationFrame(animate);
        }

        // Jalankan Semuanya
        rotateContent();
        setInterval(rotateContent, 7000);
        setInterval(createExplosion, 1200); // Kembang api setiap 1.2 detik
        animate();

    </script>
</body>
</html>
