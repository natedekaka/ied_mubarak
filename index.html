<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak 1447 H - natedekaka</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="stylesheet" href="./output.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
    </style>
</head>
<body class="text-white overflow-hidden select-none" onclick="startEverything()">

    <!-- Background -->
    <div class="fixed inset-0 z-0">
        <div id="dynamic-gradient" class="absolute inset-0 opacity-40" style="background: radial-gradient(circle at 50% 50%, var(--theme-primary), transparent 80%);"></div>
    </div>

    <canvas id="fireworks-canvas" class="fixed inset-0 z-5"></canvas>

    <!-- Main Card Container -->
    <div class="fixed inset-0 z-20 flex items-center justify-center p-4 md:p-0">
        <div class="glass w-full max-w-xs md:max-w-lg rounded-3xl md:rounded-[3.5rem] p-6 md:p-16 text-center animate-float shadow-2xl border-t border-white/20">
            <div id="accent-glow" class="absolute -top-20 -left-20 w-48 h-48 opacity-10 blur-[80px]" style="background-color: var(--theme-accent);"></div>
            
            <!-- Arabic Text -->
            <div class="font-arabic text-sm md:text-2xl mb-2 md:mb-4 tracking-widest transition-colors duration-500" style="color: var(--theme-accent);">
                عيد مبارك
            </div>
            
            <!-- Main Title -->
            <h1 class="font-script text-3xl md:text-6xl mb-4 md:mb-8 transition-colors duration-500 drop-shadow-lg" style="color: var(--theme-accent);">
                Idul Fitri 1447 H
            </h1>
            
            <!-- Message -->
            <div class="mb-4 md:mb-8 min-h-20 flex items-center justify-center">
                <p id="genz-text" class="text-xs md:text-lg leading-relaxed italic px-2 transition-all duration-700" style="color: var(--theme-accent); text-shadow: 0 2px 8px rgba(0,0,0,0.5);">
                    Slay hari raya, vibes suci 🌙
                </p>
            </div>
            
            <!-- Bottom -->
            <div class="pt-4 md:pt-8 border-t border-white/10">
                <p class="text-lg md:text-2xl mb-2">🌙🙏</p>
                <p class="text-sm md:text-lg font-bold tracking-widest uppercase" style="color: var(--theme-accent);">natedekaka</p>
            </div>
        </div>
    </div>

    <!-- Theme Buttons - Bottom -->
    <div class="fixed bottom-6 md:top-6 md:bottom-auto left-1/2 -translate-x-1/2 z-50 flex gap-3 md:gap-5 glass p-2 md:p-3 px-4 md:px-6 rounded-full border border-white/10">
        <button class="w-6 h-6 md:w-8 md:h-8 rounded-full cursor-pointer transition-transform hover:scale-110" style="background-color: #10b981;" onclick="setTheme('#064e3b', '#facc15', '#021511')"></button>
        <button class="w-6 h-6 md:w-8 md:h-8 rounded-full cursor-pointer transition-transform hover:scale-110" style="background-color: #a855f7;" onclick="setTheme('#4c1d95', '#fbbf24', '#0f0720')"></button>
        <button class="w-6 h-6 md:w-8 md:h-8 rounded-full cursor-pointer transition-transform hover:scale-110" style="background-color: #3b82f6;" onclick="setTheme('#1e3a8a', '#60a5fa', '#050b1a')"></button>
        <button class="w-6 h-6 md:w-8 md:h-8 rounded-full cursor-pointer transition-transform hover:scale-110" style="background-color: #f43f5e;" onclick="setTheme('#9f1239', '#fda4af', '#1a0505')"></button>
    </div>

    <!-- Mute Hint -->
    <div id="audio-hint" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-40 pointer-events-none">
        <div class="glass px-6 py-4 md:px-8 md:py-6 rounded-2xl border border-yellow-500/30 flex flex-col items-center gap-2 shadow-2xl animate-bounce">
            <span class="text-3xl md:text-4xl">🔊</span>
            <span class="text-xs md:text-sm font-bold text-yellow-300 uppercase tracking-wider text-center">Sentuh Layar<br/>Untuk Musik</span>
        </div>
    </div>

    <div id="youtube-player"></div>
    <audio id="sfx-pop" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- YouTube API Logic ---
        var player;
        function onYouTubeIframeAPIReady() {
            try {
                player = new YT.Player('youtube-player', {
                    height: '0', width: '0', videoId: 'EoSnWjLnhUE',
                    playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'EoSnWjLnhUE', 'controls': 0, 'showinfo': 0, 'modestbranding': 1, 'origin': window.location.origin },
                    events: { 'onReady': onPlayerReady, 'onError': onPlayerError }
                });
            } catch (e) {
                console.warn('YouTube API load error:', e);
            }
        }
        function onPlayerReady(event) { 
            try {
                event.target.mute(); 
                event.target.playVideo(); 
            } catch (e) {
                console.warn('Player ready error:', e);
            }
        }
        function onPlayerError(error) {
            console.warn('YouTube player error:', error.data);
        }
        function startEverything() {
            if (player && typeof player.unMute === 'function') {
                try {
                    player.unMute();
                    player.setVolume(60);
                    document.getElementById('audio-hint').style.display = 'none';
                    audioStarted = true;
                } catch (e) {
                    console.warn('Audio start error:', e);
                }
            }
        }
        var tag = document.createElement('script'); 
        tag.src = "https://www.youtube.com/iframe_api";
        tag.onerror = () => console.warn('YouTube iframe_api load failed');
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // --- Theme Logic ---
        function setTheme(primary, accent, bg) {
            document.documentElement.style.setProperty('--theme-primary', primary);
            document.documentElement.style.setProperty('--theme-accent', accent);
            document.documentElement.style.setProperty('--theme-bg', bg);
            document.getElementById('dynamic-gradient').style.background = `radial-gradient(circle at 50% 50%, ${primary}, transparent 80%)`;
            document.body.style.backgroundColor = bg;
        }

        const messages = [
            "POV: Lu dapet maaf dari doi pas Lebaran. No cap, ini vibes paling adem. Minal Aidin Wal Faizin, Bestie! ✨",
            "Slay hari raya dengan hati yang bersih. Skip drama, fokus berkah. Maafin segala khilaf gue ya, lowkey sering khilaf! 🙏",
            "Minal Aidin Wal Faizin! Semoga rejeki lu tumpah-tumpah kayak kuah opor. Stay halal, stay slay! 🌙",
            "Lebaran vibes check: Hati suci, baju baru (optional), maaf-maafan (mandatory). Happy Eid Mubarak, fam! 🔥",
            "Otw fitrah lagi nih. Maaf lahir batin ya, kalo ada salah kata yang gak banget. Let's start a new chapter! 🍃",
            "Gak kerasa udah lebaran aja. Hati kudu glowing lahir batin. Maafin kesalahan gue yang kemaren-kemaren ya! 🤲"
        ];
        let mIdx = 0;
        const textEl = document.getElementById('genz-text');
        const sfxPop = document.getElementById('sfx-pop');
        let audioStarted = false;

        function rotateContent() {
            textEl.style.opacity = '0';
            textEl.style.transform = 'translateY(15px)';
            setTimeout(() => {
                textEl.innerText = messages[mIdx];
                textEl.style.opacity = '1';
                textEl.style.transform = 'translateY(0)';
                mIdx = (mIdx + 1) % messages.length;
            }, 700);
        }

        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.radius = Math.random() * 2 + 0.5;
                this.velocity = { x: (Math.random() - 0.5) * 12, y: (Math.random() - 0.5) * 12 };
                this.life = 100; this.opacity = 1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.globalAlpha = this.opacity; ctx.fill();
            }
            update() {
                this.velocity.y += 0.1; this.x += this.velocity.x; this.y += this.velocity.y;
                this.life -= 2; this.opacity = Math.max(0, this.life / 100);
            }
        }
        function explode() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.6);
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--theme-accent').trim();
            const colors = [accent, '#FFFFFF', '#FFD700', '#FF4D4D', '#00FFFF'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            if (audioStarted) {
                const clonePop = sfxPop.cloneNode(); clonePop.volume = 0.1; clonePop.play().catch(() => {});
            }
            for (let i = 0; i < 35; i++) { particles.push(new Particle(x, y, color)); }
        }
        function animate() {
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--theme-bg').trim();
            ctx.globalAlpha = 0.25; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;
            particles.forEach((p, i) => { if (p.life > 0) { p.update(); p.draw(); } else { particles.splice(i, 1); } });
            requestAnimationFrame(animate);
        }
        window.onload = () => { setInterval(rotateContent, 7500); rotateContent(); setInterval(explode, 1200); animate(); };
    </script>
</body>
</html>
