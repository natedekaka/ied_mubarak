<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak 1447 H</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="stylesheet" href="./output.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--theme-bg); color: white; overflow: hidden; width: 100vw; height: 100vh; }
        
        /* Main Container */
        .card-wrapper { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: 100%; 
            padding: 15px;
        }
        
        /* Card Styling */
        .card { 
            width: 100%;
            max-width: 450px;
            aspect-ratio: 9 / 16;
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 25px; 
            padding: 35px 25px;
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            text-align: center; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
            animation: float 6s ease-in-out infinite; 
            transition: all 0.3s ease;
        }
        
        /* Desktop - Bigger Card */
        @media (min-width: 1024px) {
            .card {
                max-width: 600px;
                aspect-ratio: auto;
                width: 550px;
                height: 700px;
                padding: 60px 40px;
                border-radius: 35px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            }
        }
        
        .card-header { flex: 0 0 auto; }
        .card-content { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 15px; }
        .card-footer { flex: 0 0 auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        
        /* Typography - Mobile */
        .arabic-text { 
            font-family: 'Reem Kufi', sans-serif; 
            font-size: 18px; 
            letter-spacing: 3px; 
            margin-bottom: 10px;
            opacity: 0.9;
        }
        .title { 
            font-family: 'Dancing Script', cursive; 
            font-size: 42px; 
            margin-bottom: 8px; 
            font-weight: 700; 
            line-height: 1.2;
        }
        .subtitle { 
            font-size: 12px; 
            letter-spacing: 2px; 
            opacity: 0.7; 
            margin-bottom: 8px; 
        }
        .message { 
            font-size: 14px; 
            line-height: 1.5; 
            min-height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .emoji { 
            font-size: 28px; 
            margin-bottom: 8px; 
        }
        .name { 
            font-size: 14px; 
            font-weight: 700; 
            letter-spacing: 2px; 
        }
        
        /* Typography - Desktop */
        @media (min-width: 1024px) {
            .arabic-text { font-size: 28px; margin-bottom: 15px; }
            .title { font-size: 60px; margin-bottom: 12px; }
            .subtitle { font-size: 14px; margin-bottom: 12px; }
            .message { font-size: 18px; min-height: 70px; }
            .emoji { font-size: 40px; margin-bottom: 12px; }
            .name { font-size: 18px; }
        }
        
        /* Theme Buttons */
        .themes { 
            position: fixed; 
            bottom: 25px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 12px; 
            z-index: 50; 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(20px); 
            padding: 12px 18px; 
            border-radius: 50px; 
            border: 1px solid rgba(255,255,255,0.1); 
            transition: all 0.3s ease;
        }
        
        @media (min-width: 1024px) {
            .themes {
                bottom: 40px;
                gap: 16px;
                padding: 14px 24px;
            }
        }
        
        .theme-btn { 
            width: 26px; 
            height: 26px; 
            border-radius: 50%; 
            cursor: pointer; 
            border: 2px solid rgba(255,255,255,0.3); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @media (min-width: 1024px) {
            .theme-btn {
                width: 32px;
                height: 32px;
            }
        }
        
        .theme-btn:hover { 
            transform: scale(1.15); 
            border-color: white; 
        }
        
        .theme-btn:active {
            transform: scale(0.95);
        }
        
        /* Hint */
        .hint { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 40; 
            pointer-events: none; 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(20px); 
            padding: 28px 36px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,200,100,0.3); 
            text-align: center; 
            animation: bounce 2s infinite; 
        }
        
        @media (min-width: 1024px) {
            .hint {
                padding: 40px 50px;
                border-radius: 30px;
            }
        }
        
        .hint-emoji { 
            font-size: 36px; 
            margin-bottom: 10px; 
        }
        
        @media (min-width: 1024px) {
            .hint-emoji { font-size: 48px; margin-bottom: 15px; }
        }
        
        .hint-text { 
            font-size: 13px; 
            letter-spacing: 1px; 
            color: #fbbf24; 
        }
        
        @media (min-width: 1024px) {
            .hint-text { font-size: 16px; letter-spacing: 1.5px; }
        }
        
        /* Animations */
        @keyframes float { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-8px); } 
        }
        @keyframes bounce { 
            0%, 100% { transform: translate(-50%, -50%); } 
            50% { transform: translate(-50%, -55%); } 
        }
        
        /* Background */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
    </style>
</head>
<body onclick="startEverything()">
    <div class="bg-layer">
        <div id="bg-gradient" class="absolute inset-0 opacity-50" style="background: radial-gradient(circle at 50% 50%, var(--theme-primary), transparent 80%);"></div>
    </div>

    <canvas id="fireworks" class="fixed inset-0 z-5"></canvas>

    <div class="card-wrapper z-20">
        <div class="card">
            <div class="card-header">
                <div class="arabic-text" style="color: var(--theme-accent);">عيد مبارك</div>
                <div class="subtitle" style="color: var(--theme-accent);">IDUL FITRI 1447 H</div>
            </div>

            <div class="card-content">
                <div class="title" style="color: var(--theme-accent);">Selamat<br/>Hari Raya</div>
                <div class="message" id="message" style="color: var(--theme-accent); text-shadow: 0 2px 8px rgba(0,0,0,0.5);">
                    Slay hari raya, vibes suci 🌙
                </div>
            </div>

            <div class="card-footer">
                <div class="emoji">🌙🙏</div>
                <div class="name" style="color: var(--theme-accent);">natedekaka</div>
            </div>
        </div>
    </div>

    <div id="hint" class="hint">
        <div class="hint-emoji">🔊</div>
        <div class="hint-text">Sentuh Layar<br/>Untuk Musik</div>
    </div>

    <div class="themes">
        <button class="theme-btn" style="background: #10b981;" onclick="switchTheme('#064e3b', '#facc15', '#021511')" title="Hijau"></button>
        <button class="theme-btn" style="background: #a855f7;" onclick="switchTheme('#4c1d95', '#fbbf24', '#0f0720')" title="Ungu"></button>
        <button class="theme-btn" style="background: #3b82f6;" onclick="switchTheme('#1e3a8a', '#60a5fa', '#050b1a')" title="Biru"></button>
        <button class="theme-btn" style="background: #f43f5e;" onclick="switchTheme('#9f1239', '#fda4af', '#1a0505')" title="Merah Muda"></button>
    </div>

    <div id="youtube"></div>
    <audio id="pop" preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg"></audio>

    <script>
        var player, audioStarted = false;
        
        function onYouTubeIframeAPIReady() {
            try {
                player = new YT.Player('youtube', {
                    height: 0, width: 0, videoId: 'EoSnWjLnhUE',
                    playerVars: { autoplay: 1, loop: 1, playlist: 'EoSnWjLnhUE', controls: 0, modestbranding: 1, origin: window.location.origin },
                    events: { onReady: (e) => { e.target.mute(); e.target.playVideo(); } }
                });
            } catch (e) { console.warn(e); }
        }
        
        function startEverything() {
            if (player && typeof player.unMute === 'function') {
                player.unMute();
                player.setVolume(60);
                document.getElementById('hint').style.display = 'none';
                audioStarted = true;
            }
        }
        
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

        function switchTheme(p, a, b) {
            document.documentElement.style.setProperty('--theme-primary', p);
            document.documentElement.style.setProperty('--theme-accent', a);
            document.documentElement.style.setProperty('--theme-bg', b);
            document.getElementById('bg-gradient').style.background = `radial-gradient(circle at 50% 50%, ${p}, transparent 80%)`;
            document.body.style.backgroundColor = b;
        }

        const messages = [
            "Slay hari raya, vibes suci 🌙",
            "Minal Aidin Wal Faizin, Bestie! ✨",
            "Maaf lahir batin ya! 🙏",
            "Happy Eid Mubarak, fam! 🔥",
            "Let's start a new chapter! 🍃",
            "Hati kudu glowing lahir batin! 🤲"
        ];
        
        let msgIdx = 0;
        const msgEl = document.getElementById('message');
        const popAudio = document.getElementById('pop');
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function updateMessage() {
            msgEl.style.opacity = '0';
            setTimeout(() => {
                msgEl.textContent = messages[msgIdx];
                msgEl.style.opacity = '1';
                msgIdx = (msgIdx + 1) % messages.length;
            }, 400);
            msgEl.style.transition = 'opacity 0.4s ease';
        }

        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2 + 0.5;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 100;
                this.opacity = 1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
            }
            update() {
                this.vy += 0.1;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 2;
                this.opacity = Math.max(0, this.life / 100);
            }
        }

        function burst() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.6);
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--theme-accent').trim();
            const colors = [accent, '#fff', '#ffd700'];
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
            }
            if (audioStarted) {
                const clone = popAudio.cloneNode();
                clone.volume = 0.1;
                clone.play().catch(() => {});
            }
        }

        function animate() {
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--theme-bg').trim();
            ctx.globalAlpha = 0.2;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            setInterval(updateMessage, 6000);
            setInterval(burst, 1000);
            animate();
        };
    </script>
</body>
</html>
