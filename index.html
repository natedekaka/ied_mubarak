<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Idul Fitri - natedekaka</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a2e24;
            --secondary: #e6b91e;
            --accent: #ffd700;
            --text-light: #ffffff;
            --bg-overlay: rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: var(--primary);
            user-select: none;
            touch-action: manipulation;
        }

        #bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 2s ease-in-out;
            z-index: -5;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 10%, var(--primary) 150%);
            background-color: var(--bg-overlay);
            z-index: -4;
        }

        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Di atas overlay, di bawah container */
            pointer-events: none;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            color: var(--text-light);
            position: relative;
            z-index: 10;
        }

        .greeting-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 30px;
            border-radius: 30px;
            border: 1px solid rgba(230, 185, 30, 0.4);
            max-width: 650px;
            width: 95%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: cardEntrance 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .calligraphy {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 1.5rem;
            color: var(--secondary);
            margin-bottom: 5px;
            letter-spacing: 5px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--accent);
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .message {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 30px;
            min-height: 100px;
            font-style: italic;
            transition: opacity 0.8s ease;
        }

        .signature {
            font-weight: 600;
            letter-spacing: 4px;
            color: var(--secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            border-top: 1px solid rgba(230, 185, 30, 0.3);
            display: inline-block;
            padding-top: 15px;
        }

        /* Animations */
        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .hint {
            position: fixed;
            bottom: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
            color: white;
            animation: fadeInOut 3s infinite;
            z-index: 20;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .message { font-size: 1rem; }
            .greeting-card { padding: 40px 20px; }
        }
    </style>
</head>
<body onmousedown="handleInteraction(event)" ontouchstart="handleInteraction(event)">

    <div id="bg-image"></div>
    <div class="overlay"></div>
    <canvas id="fireworks"></canvas>

    <div class="container">
        <div class="greeting-card">
            <div class="calligraphy">عيد مبارك</div>
            <h1>Idul Fitri 1445 H</h1>
            <div class="message" id="dynamic-text">
                Menghimpun doa dan keberkahan...
            </div>
            <div class="signature">natedekaka</div>
        </div>
        <div class="hint">Sentuh layar untuk kembang api ✨</div>
    </div>

    <script>
        // --- CONTENT ---
        const messages = [
            "Lisan seringkali tajam, hati pun kadang berdebu. Di hari yang suci ini, izinkan aku memohon maaf atas segala khilafku.",
            "Semesta bertasbih menyambut kemenangan. Mari bersihkan jiwa, eratkan ukhuwah, dan tebar cinta kasih di hari yang fitri.",
            "Bukan tentang kembali menjadi baru, tapi tentang kembali menjadi suci. Selamat Lebaran, semoga keberkahan menyertaimu.",
            "Maaf tak bisa menghapus masa lalu, tapi ia mampu memperindah masa depan. Selamat Idul Fitri, mohon maaf lahir dan batin.",
            "Gema Takbir telah berkumandang, tanda kemenangan telah datang. Selamat merayakan hari kemenangan bersama keluarga tercinta.",
            "Kesalahan adalah manusiawi, memaafkan adalah ukhuwi. Mari kita rajut kembali tali persaudaraan dengan hati yang damai."
        ];

        const images = [
            "https://images.unsplash.com/photo-1598048145816-43516339480d?auto=format&fit=crop&q=80&w=1600",
            "https://images.unsplash.com/photo-1518005020250-675f0f0fd13b?auto=format&fit=crop&q=80&w=1600",
            "https://images.unsplash.com/photo-1564149504294-81c62f927711?auto=format&fit=crop&q=80&w=1600",
            "https://images.unsplash.com/photo-1542332213-31f87348057f?auto=format&fit=crop&q=80&w=1600"
        ];

        let msgIndex = 0;
        let imgIndex = 0;

        function updateContent() {
            const textElement = document.getElementById('dynamic-text');
            const bgElement = document.getElementById('bg-image');

            textElement.style.opacity = 0;
            setTimeout(() => {
                textElement.innerText = messages[msgIndex];
                bgElement.style.backgroundImage = `url('${images[imgIndex]}')`;
                textElement.style.opacity = 1;
                msgIndex = (msgIndex + 1) % messages.length;
                imgIndex = (imgIndex + 1) % images.length;
            }, 800);
        }

        // --- FIREWORKS ---
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {
                    x: (Math.random() - 0.5) * 12,
                    y: (Math.random() - 0.5) * 12
                };
                this.alpha = 1;
                this.friction = 0.96;
                this.gravity = 0.15;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.velocity.y += this.gravity;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.012;
            }
        }

        function createFirework(x, y) {
            const colors = ['#ffd700', '#ffffff', '#e6b91e', '#ff4d4d', '#00ffcc', '#ff00ff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function handleInteraction(e) {
            let x, y;
            if (e.touches) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            createFirework(x, y);
        }

        function animate() {
            requestAnimationFrame(animate);
            // Clear canvas with transparency for trails
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-over';

            particles.forEach((particle, index) => {
                if (particle.alpha > 0) {
                    particle.update();
                    particle.draw();
                } else {
                    particles.splice(index, 1);
                }
            });
        }

        // Auto fireworks
        setInterval(() => {
            createFirework(Math.random() * canvas.width, Math.random() * (canvas.height * 0.4));
        }, 1500);

        updateContent();
        setInterval(updateContent, 8000);
        animate();
    </script>
</body>
</html>
