<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak 1447 H - natedekaka</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-arabic { font-family: 'Reem Kufi', sans-serif; }
        .font-script { font-family: 'Dancing Script', cursive; }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .neon-glow {
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5), 0 0 20px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body class="bg-[#021511] text-white overflow-hidden">

    <!-- Background Layer -->
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,#064e3b,transparent_70%)] opacity-50"></div>
        <div id="bg-img" class="absolute inset-0 bg-cover bg-center transition-all duration-1000 opacity-30 scale-110"></div>
    </div>

    <canvas id="fireworks-canvas"></canvas>

    <!-- UI Overlay -->
    <main class="relative z-20 h-screen w-screen flex flex-col items-center justify-center p-6">
        
        <!-- Start Button (To bypass Autoplay block) -->
        <div id="overlay-start" class="fixed inset-0 z-50 flex items-center justify-center bg-[#021511]">
            <button onclick="startCelebration()" class="px-8 py-4 bg-yellow-500 hover:bg-yellow-400 text-emerald-950 font-bold rounded-full transition-all transform hover:scale-110 active:scale-95 shadow-[0_0_30px_rgba(234,179,8,0.4)]">
                Mulai Rayakan ✨
            </button>
        </div>

        <!-- Main Card -->
        <div class="glass max-w-md w-full rounded-[2.5rem] p-8 md:p-12 text-center animate-float shadow-2xl relative overflow-hidden">
            <!-- Decorative Light -->
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-yellow-500/20 blur-3xl"></div>
            
            <div class="font-arabic text-yellow-500 text-2xl mb-4 tracking-widest opacity-80">عيد مبارك</div>
            
            <h1 class="font-script text-5xl md:text-6xl text-yellow-400 mb-6 neon-glow">Idul Fitri 1447 H</h1>
            
            <div class="h-40 flex items-center justify-center mb-8">
                <p id="genz-text" class="text-lg md:text-xl font-light leading-relaxed italic text-emerald-50 transition-all duration-500">
                    Slay hari kemenangan...
                </p>
            </div>

            <div class="pt-8 border-t border-white/10">
                <p class="text-xs tracking-[0.3em] uppercase text-yellow-500/70 font-bold mb-1">Created with Vibes by</p>
                <p class="text-lg font-bold text-white tracking-widest">natedekaka</p>
            </div>
        </div>

        <p class="mt-12 text-emerald-500/50 text-xs tracking-widest uppercase">Auto Fireworks & Lo-fi Vibes Active</p>
    </main>

    <!-- Audio Elements -->
    <audio id="bgm" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfx-pop" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- Gen Z Messages ---
        const messages = [
            "POV: Lu dapet maaf dari doi pas Lebaran. No cap, ini vibes paling adem. Minal Aidin Wal Faizin, Bestie! ✨",
            "Slay hari raya dengan hati yang bersih. Skip drama, fokus berkah. Maafin segala khilaf gue ya, lowkey sering khilaf! 🙏",
            "Minal Aidin Wal Faizin! Semoga rejeki lu tumpah-tumpah kayak kuah opor. Stay halal, stay slay! 🌙",
            "Lebaran vibes check: Hati suci, baju baru (optional), maaf-maafan (mandatory). Happy Eid Mubarak, fam! 🔥",
            "Otw fitrah lagi nih. Maaf lahir batin ya, kalo ada salah kata yang gak banget. Let's start a new chapter! 🍃",
            "Gak kerasa udah lebaran aja. Hati kudu glowing lahir batin. Maafin kesalahan gue yang kemaren-kemaren ya! 🤲"
        ];

        const images = [
            "https://images.unsplash.com/photo-1598048145816-43516339480d?auto=format&fit=crop&q=80&w=1200",
            "https://images.unsplash.com/photo-1542332213-31f87348057f?auto=format&fit=crop&q=80&w=1200",
            "https://images.unsplash.com/photo-1564769641470-87a3939615a1?auto=format&fit=crop&q=80&w=1200"
        ];

        let mIdx = 0, iIdx = 0;
        const textEl = document.getElementById('genz-text');
        const bgEl = document.getElementById('bg-img');
        const bgm = document.getElementById('bgm');
        const sfxPop = document.getElementById('sfx-pop');

        function rotateContent() {
            textEl.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => {
                textEl.innerText = messages[mIdx];
                bgEl.style.backgroundImage = `url('${images[iIdx]}')`;
                textEl.classList.remove('opacity-0', 'translate-y-4');
                mIdx = (mIdx + 1) % messages.length;
                iIdx = (iIdx + 1) % images.length;
            }, 600);
        }

        function startCelebration() {
            document.getElementById('overlay-start').style.display = 'none';
            bgm.volume = 0.4;
            bgm.play().catch(e => console.log("Audio play blocked"));
            setInterval(rotateContent, 7000);
            rotateContent();
        }

        // --- Fireworks System ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2 + 1;
                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8
                };
                this.life = 100;
                this.opacity = 1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
            }

            update() {
                this.velocity.y += 0.05;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.life -= 1.2;
                this.opacity = this.life / 100;
            }
        }

        function explode() {
            if(document.getElementById('overlay-start').style.display === 'none') {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height * 0.7);
                const colors = ['#facc15', '#ffffff', '#fbbf24', '#34d399', '#f472b6', '#60a5fa'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                // Play SFX
                const clonePop = sfxPop.cloneNode();
                clonePop.volume = 0.2;
                clonePop.play();

                for (let i = 0; i < 40; i++) {
                    particles.push(new Particle(x, y, color));
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 21, 17, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, i) => {
                if (p.life > 0) {
                    p.update();
                    p.draw();
                } else {
                    particles.splice(i, 1);
                }
            });
            requestAnimationFrame(animate);
        }

        setInterval(explode, 1500);
        animate();

    </script>
</body>
</html>
