<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak 1447 H</title>
    <meta name="description" content="Kartu ucapan Eid Mubarak interaktif dengan musik, animasi, dan pesan maaf yang penuh makna. Selamat Hari Raya Idul Fitri 1447 H! 🌙✨">
    <meta name="theme-color" content="#021511">
    
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="stylesheet" href="./output.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--theme-bg); color: white; overflow: hidden; width: 100vw; height: 100vh; }
        
        .bg-layer { position: fixed; inset: 0; z-index: 0; }
        #fireworks { position: fixed; inset: 0; z-index: 5; }
        .card-wrapper { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 15px 15px 100px 15px; z-index: 20; }
        
        .card { 
            width: 100%; max-width: 450px; aspect-ratio: 9 / 16;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; 
            padding: 35px 25px; display: flex; flex-direction: column; 
            justify-content: space-between; text-align: center; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
            animation: float 6s ease-in-out infinite; overflow: hidden; 
        }
        
        @media (min-width: 1024px) {
            .card-wrapper { padding: 15px 15px 120px 15px; }
            .card { max-width: 600px; width: 550px; height: 700px; padding: 60px 40px; border-radius: 35px; }
        }
        
        .card-header { flex: 0 0 auto; }
        .card-content { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 15px; position: relative; }
        .card-footer { flex: 0 0 auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        
        .arabic-text { font-family: 'Reem Kufi', sans-serif; font-size: 18px; letter-spacing: 3px; margin-bottom: 10px; opacity: 0.9; }
        .title { font-family: 'Dancing Script', cursive; font-size: 42px; margin-bottom: 8px; font-weight: 700; line-height: 1.2; }
        .subtitle { font-size: 12px; letter-spacing: 2px; opacity: 0.7; margin-bottom: 8px; }
        .message { font-size: 14px; line-height: 1.5; min-height: 50px; display: flex; align-items: center; justify-content: center; position: relative; }
        .emoji { font-size: 28px; margin-bottom: 8px; }
        .name { font-size: 14px; font-weight: 700; letter-spacing: 2px; }
        
        @media (min-width: 1024px) {
            .arabic-text { font-size: 28px; margin-bottom: 15px; }
            .title { font-size: 60px; margin-bottom: 12px; }
            .message { font-size: 18px; min-height: 70px; }
            .emoji { font-size: 40px; margin-bottom: 12px; }
        }
        
        .themes { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 12px; z-index: 50; background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(20px); padding: 12px 18px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); 
        }
        .theme-btn { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.3); transition: all 0.3s; }
        .theme-btn:hover { transform: scale(1.15); border-color: white; }
        
        #tap-overlay {
            position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center;
            cursor: pointer; visibility: visible; opacity: 1; transition: opacity 0.5s ease;
        }
        .tap-content { text-align: center; }
        .tap-icon { font-size: 80px; margin-bottom: 20px; animation: pulse-scale 1.5s infinite; }
        .tap-text { font-size: 20px; font-weight: 800; letter-spacing: 3px; color: #fbbf24; margin-bottom: 10px; }
        #tap-status { font-size: 12px; color: #aaa; letter-spacing: 1px; }

        @keyframes pulse-scale { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes pulse { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes flip { 0% { opacity: 0; transform: rotateX(90deg); } 100% { opacity: 1; transform: rotateX(0deg); } }
        @keyframes slide-in { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes fade-scale { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes wiggle { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
    </style>
</head>
<body onclick="handleUserInteraction()" ontouchstart="handleUserInteraction()">
    <div class="bg-layer">
        <div id="bg-gradient" class="absolute inset-0 opacity-50" style="background: radial-gradient(circle at 50% 50%, var(--theme-primary), transparent 80%);"></div>
    </div>
    <canvas id="fireworks"></canvas>

    <div id="tap-overlay">
        <div class="tap-content">
            <div class="tap-icon">🎵</div>
            <div class="tap-text">SENTUH LAYAR<br/>UNTUK MULAI</div>
            <div id="tap-status">Menunggu interaksi...</div>
        </div>
    </div>

    <div class="card-wrapper">
        <div class="card">
            <div class="card-header">
                <div class="arabic-text" style="color: var(--theme-accent);">عيد مبارك</div>
                <div class="subtitle" style="color: var(--theme-accent);">IDUL FITRI 1447 H</div>
            </div>
            <div class="card-content">
                <div class="title" style="color: var(--theme-accent);">Selamat<br/>Hari Raya</div>
                <div class="message" id="message" style="color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.5);">Slay hari raya, vibes suci 🌙</div>
            </div>
            <div class="card-footer">
                <div class="emoji">🌙🙏</div>
                <div class="name" style="color: var(--theme-accent);">natedekaka</div>
            </div>
        </div>
    </div>

    <div class="themes">
        <button class="theme-btn" style="background: #10b981;" onclick="switchTheme('#064e3b', '#facc15', '#021511')"></button>
        <button class="theme-btn" style="background: #a855f7;" onclick="switchTheme('#4c1d95', '#fbbf24', '#0f0720')"></button>
        <button class="theme-btn" style="background: #3b82f6;" onclick="switchTheme('#1e3a8a', '#60a5fa', '#050b1a')"></button>
        <button class="theme-btn" style="background: #f43f5e;" onclick="switchTheme('#9f1239', '#fda4af', '#1a0505')"></button>
    </div>

    <audio id="main-audio" loop preload="auto">
        <source src="https://raw.githubusercontent.com/Nasheeds/collection/master/Beats%20of%20Happiness%20-%20Eid%20Nasheed.mp3" type="audio/mpeg">
    </audio>
    <audio id="pop" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        var audioStarted = false;
        const mainAudio = document.getElementById('main-audio');
        const tapOverlay = document.getElementById('tap-overlay');
        const tapStatus = document.getElementById('tap-status');
        
        function handleUserInteraction() {
            if (audioStarted) return;
            
            tapStatus.textContent = "MEMULAI MUSIK...";
            mainAudio.volume = 0.6;
            
            mainAudio.play().then(() => {
                audioStarted = true;
                tapOverlay.style.opacity = '0';
                setTimeout(() => tapOverlay.style.visibility = 'hidden', 500);
            }).catch(e => {
                console.error("Playback failed:", e);
                tapStatus.textContent = "GAGAL MEMUTAR. COBA LAGI.";
            });
        }

        mainAudio.onerror = () => {
            tapStatus.textContent = "ERROR: MUSIK TIDAK DAPAT DIMUAT.";
            tapStatus.style.color = "#ff4444";
        };

        window.onload = () => {
            setInterval(updateMessage, 6000);
            setInterval(burst, 1000);
            animate();
        };

        function switchTheme(p, a, b) {
            document.documentElement.style.setProperty('--theme-primary', p);
            document.documentElement.style.setProperty('--theme-accent', a);
            document.documentElement.style.setProperty('--theme-bg', b);
            document.getElementById('bg-gradient').style.background = `radial-gradient(circle at 50% 50%, ${p}, transparent 80%)`;
            document.body.style.backgroundColor = b;
        }

        const messages = [
            "Maaf lahir batin itu lebih dari sekadar kata-kata, tapi tentang beneran bersihkan hati dan mulai fresh dari nol 🙏✨",
            "Kita semua pernah salah, dan itu normal banget, yang penting adalah keberanian untuk minta maaf dan tulus terima maafnya 💚",
            "Maafin diri sendiri duluan itu hard truth yang perlu kita kuatin, karena nggak bisa minta maaf ke orang lain kalau hati masih penuh rasa bersalah 🌙",
            "Lebaran ini kesempatan sempurna untuk lepas semua dendam, sakit hati, dan kekecewaan yang kita pendam selama ini dengan ikhlas 💫",
            "Jangan tunda-tunda lagi untuk hubungi orang yang pernah kita sakiti, karena hidup terlalu singkat untuk nyimpen rasa bersalah 🔥🙏",
            "Maaf itu bukan tentang siapa yang salah atau benar, tapi tentang pilihan untuk terus bersama dengan hati yang lebih ringan dan tulus 💕",
            "Setiap orang berhak dapat kesempatan kedua, kita juga pantas dapat, jadi open your heart dan terima maaf orang lain dengan tulus 🌸",
            "Yang paling sulit itu nggak minta maaf, tapi menerima maaf orang lain dan benar-benar melepaskan masa lalu dengan penuh pengertian 💯",
            "Maafin orang yang pernah sakit in hati itu bukan tentang mereka, tapi tentang kebebasan dan perdamaian untuk diri sendiri 🕊️✨",
            "Di hari istimewa ini, jadilah versi diri yang lebih baik, lebih pemaaf, and lebih siap untuk mulai chapter baru bersama orang-orang terkasih 🌟👑"
        ];
        
        let msgIdx = 0;
        const msgEl = document.getElementById('message');
        const popAudio = document.getElementById('pop');
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const animationTypes = ['pulse', 'flip', 'slide-in', 'fade-scale', 'wiggle'];
        
        function getRandomAnimation() { return animationTypes[Math.floor(Math.random() * animationTypes.length)]; }
        
        function updateMessage() {
            msgEl.style.opacity = '0';
            setTimeout(() => {
                msgEl.textContent = messages[msgIdx];
                msgEl.style.animation = `${getRandomAnimation()} 0.6s ease-out`;
                msgEl.style.opacity = '1';
                msgIdx = (msgIdx + 1) % messages.length;
            }, 300);
        }

        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.radius = Math.random() * 2 + 0.5;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 100;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.globalAlpha = this.life / 100; ctx.fill();
            }
            update() { this.vy += 0.1; this.x += this.vx; this.y += this.vy; this.life -= 2; }
        }

        function burst() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.6);
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--theme-accent').trim();
            for (let i = 0; i < 30; i++) particles.push(new Particle(x, y, i % 2 === 0 ? accent : '#fff'));
            if (audioStarted) { const clone = popAudio.cloneNode(); clone.volume = 0.1; clone.play().catch(() => {}); }
        }

        function animate() {
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--theme-bg').trim();
            ctx.globalAlpha = 0.2; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.globalAlpha = 1;
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
